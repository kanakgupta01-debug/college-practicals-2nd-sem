<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Experiment 5 – Employee Array & Object System</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

  <!-- External CSS (separate file) -->
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ══ HEADER ══ -->
  <header class="header">
    <div class="container">
      <div class="header-inner">
        <div>
          <span class="badge">Experiment 5</span>
          <h1 class="site-title">Employee <span class="accent">Manager</span></h1>
          <p class="site-sub">Arrays &amp; Objects · for…in · for…of · filter · map</p>
        </div>
        <div class="emp-count-wrap">
          <div class="emp-count" id="empCountHeader">0</div>
          <div class="emp-count-lbl">Employees</div>
        </div>
      </div>
    </div>
  </header>

  <main class="container main-grid">

    <!-- ══ LEFT: ADD EMPLOYEE FORM ══ -->
    <section class="card form-card">
      <div class="card-title">
        <span class="dot"></span> Add Employee
      </div>

      <div class="form-group">
        <label for="empName">Employee Name</label>
        <input type="text" id="empName" placeholder="e.g. Riya Sharma" />
      </div>

      <div class="form-group">
        <label for="empId">Employee ID</label>
        <input type="text" id="empId" placeholder="e.g. EMP-001" />
      </div>

      <div class="form-group">
        <label for="empSalary">Salary (₹)</label>
        <input type="number" id="empSalary" placeholder="e.g. 55000" min="0" />
      </div>

      <div class="form-group">
        <label for="empDept">Department</label>
        <select id="empDept">
          <option value="">— Select Department —</option>
          <option>Engineering</option>
          <option>Marketing</option>
          <option>Finance</option>
          <option>HR</option>
          <option>Sales</option>
          <option>Design</option>
        </select>
      </div>

      <button class="btn btn-primary" onclick="addEmployee()">+ Add Employee</button>
      <div class="form-msg" id="formMsg"></div>
    </section>

    <!-- ══ RIGHT: CONTROLS + OUTPUT ══ -->
    <section class="right-col">

      <!-- Action Buttons -->
      <div class="card actions-card">
        <div class="card-title"><span class="dot"></span> Operations</div>
        <div class="btn-grid">
          <button class="btn btn-action" onclick="displayAll()">
            <span class="btn-icon">📋</span> Display All
          </button>
          <button class="btn btn-action" onclick="filterHighSalary()">
            <span class="btn-icon">💰</span> Salary &gt; ₹50,000
          </button>
          <button class="btn btn-action" onclick="calcTotal()">
            <span class="btn-icon">∑</span> Total Payout
          </button>
          <button class="btn btn-action" onclick="calcAverage()">
            <span class="btn-icon">⌀</span> Avg Salary
          </button>
          <button class="btn btn-action dept-btn" onclick="showDeptFilter()">
            <span class="btn-icon">🏢</span> Dept Count
          </button>
          <button class="btn btn-danger"  onclick="clearOutput()">
            <span class="btn-icon">✕</span> Clear Output
          </button>
        </div>

        <!-- Department filter (hidden until needed) -->
        <div class="dept-filter hidden" id="deptFilter">
          <select id="deptSelect">
            <option value="">— Choose Department —</option>
            <option>Engineering</option>
            <option>Marketing</option>
            <option>Finance</option>
            <option>HR</option>
            <option>Sales</option>
            <option>Design</option>
          </select>
          <button class="btn btn-sm" onclick="countDept()">Count</button>
        </div>
      </div>

      <!-- Output Panel -->
      <div class="card output-card" id="outputCard">
        <div class="card-title"><span class="dot"></span> Output <span class="output-tag" id="outputTag"></span></div>

        <!-- Stats row (shown for totals/avg) -->
        <div class="stat-row hidden" id="statRow">
          <div class="stat-box">
            <div class="stat-val" id="statVal1">—</div>
            <div class="stat-lbl" id="statLbl1">—</div>
          </div>
          <div class="stat-box">
            <div class="stat-val" id="statVal2">—</div>
            <div class="stat-lbl" id="statLbl2">—</div>
          </div>
        </div>

        <!-- Table output -->
        <div id="tableWrap" class="table-wrap">
          <p class="empty-msg" id="emptyMsg">Use the buttons above to perform operations.</p>
          <table class="emp-table hidden" id="empTable">
            <thead>
              <tr>
                <th>#</th>
                <th>ID</th>
                <th>Name</th>
                <th>Department</th>
                <th>Salary</th>
              </tr>
            </thead>
            <tbody id="empTableBody"></tbody>
          </table>
        </div>
      </div>

    </section>
  </main>

  <!-- ══ FOOTER ══ -->
  <footer class="footer">
    &copy; 2026 Experiment 5 &mdash; JavaScript Arrays &amp; Objects &nbsp;|&nbsp;
    <span class="accent">HTML · CSS · JavaScript</span>
  </footer>

  <!-- External JS (separate file) -->
  <script src="script.js"></script>
</body>
</html>
