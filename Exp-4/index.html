<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Experiment 4 – Student Grade Calculator</title>

  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    /* ── CSS VARIABLES ── */
    :root {
      --bg:        #0a0a0f;
      --surface:   #13131a;
      --card:      #1a1a24;
      --border:    #2a2a3a;
      --accent:    #7c3aed;
      --accent2:   #a78bfa;
      --green:     #22c55e;
      --red:       #ef4444;
      --yellow:    #eab308;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --radius:    14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header .badge {
      display: inline-block;
      background: var(--accent)/0.15;
      background-color: rgba(124,58,237,.15);
      color: var(--accent2);
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: .35em 1em;
      border-radius: 999px;
      border: 1px solid rgba(124,58,237,.3);
      margin-bottom: 1rem;
    }

    header h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      color: #fff;
      margin-bottom: .5rem;
    }

    header h1 span { color: var(--accent2); }

    header p {
      color: var(--muted);
      font-size: .95rem;
    }

    /* ── MAIN CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 540px;
      margin-bottom: 1.5rem;
    }

    .card-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: .85rem;
      color: var(--accent2);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 1.4rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    .card-title::before {
      content: '';
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--accent2);
      border-radius: 50%;
    }

    /* ── FORM ELEMENTS ── */
    label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: .4rem;
      letter-spacing: .3px;
    }

    input[type="number"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem;
      padding: .7rem 1rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      margin-bottom: 1.2rem;
    }

    input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,58,237,.2);
    }

    /* ── MARKS GRID ── */
    #marksGrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .8rem;
      margin-bottom: 1.2rem;
    }

    #marksGrid .mark-group label {
      font-size: .8rem;
    }

    #marksGrid .mark-group input {
      margin-bottom: 0;
    }

    /* ── BUTTONS ── */
    .btn {
      width: 100%;
      padding: .85rem;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .3px;
      transition: opacity .2s, transform .15s;
    }

    .btn:hover  { opacity: .88; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      margin-bottom: .7rem;
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
      font-size: .9rem;
    }

    /* ── STEP INDICATOR ── */
    .steps {
      display: flex;
      justify-content: center;
      gap: .5rem;
      margin-bottom: 2rem;
    }

    .step-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--border);
      transition: background .3s;
    }

    .step-dot.active { background: var(--accent2); }
    .step-dot.done   { background: var(--green); }

    /* ── RESULT CARD ── */
    #resultCard {
      display: none;
      width: 100%;
      max-width: 540px;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .8rem;
      margin-bottom: 1.2rem;
    }

    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
    }

    .stat-box .val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
    }

    .stat-box .lbl {
      font-size: .75rem;
      color: var(--muted);
      margin-top: .2rem;
      letter-spacing: .5px;
      text-transform: uppercase;
    }

    /* Grade badge */
    .grade-badge {
      text-align: center;
      padding: 1.4rem;
      border-radius: 12px;
      margin-bottom: 1rem;
      border: 1px solid;
    }

    .grade-badge .grade-letter {
      font-family: 'JetBrains Mono', monospace;
      font-size: 3rem;
      font-weight: 700;
      line-height: 1;
    }

    .grade-badge .grade-label {
      font-size: .85rem;
      margin-top: .4rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* grade colours */
    .grade-O  { background:rgba(34,197,94,.1);   border-color:rgba(34,197,94,.4);  color:var(--green); }
    .grade-A  { background:rgba(34,197,94,.07);  border-color:rgba(34,197,94,.3);  color:#4ade80; }
    .grade-B  { background:rgba(167,139,250,.1); border-color:rgba(167,139,250,.4);color:var(--accent2); }
    .grade-C  { background:rgba(234,179,8,.1);   border-color:rgba(234,179,8,.4);  color:var(--yellow); }
    .grade-D  { background:rgba(249,115,22,.1);  border-color:rgba(249,115,22,.4); color:#fb923c; }
    .grade-F  { background:rgba(239,68,68,.1);   border-color:rgba(239,68,68,.4);  color:var(--red); }

    /* pass/fail */
    .pf-badge {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      font-size: 1rem;
      font-weight: 700;
      padding: .6rem 1.5rem;
      border-radius: 999px;
      border: 1px solid;
    }

    .pf-pass { background:rgba(34,197,94,.12); border-color:rgba(34,197,94,.4); color:var(--green); }
    .pf-fail { background:rgba(239,68,68,.12); border-color:rgba(239,68,68,.4); color:var(--red); }

    /* marks breakdown table */
    .marks-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .88rem;
      margin-top: .8rem;
    }

    .marks-table th {
      text-align: left;
      padding: .5rem .8rem;
      color: var(--muted);
      font-weight: 600;
      font-size: .78rem;
      letter-spacing: .5px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    .marks-table td {
      padding: .55rem .8rem;
      border-bottom: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace;
    }

    .marks-table tr:last-child td { border-bottom: none; }

    .marks-table .pass { color: var(--green); }
    .marks-table .fail { color: var(--red); }

    /* hidden */
    .hidden { display: none; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="badge">Experiment 4</div>
    <h1>Student <span>Grade</span> Calculator</h1>
    <p>JavaScript · Variables · Loops · Conditions</p>
  </header>

  <!-- STEP DOTS -->
  <div class="steps">
    <div class="step-dot active" id="dot1"></div>
    <div class="step-dot"        id="dot2"></div>
    <div class="step-dot"        id="dot3"></div>
  </div>

  <!-- ══ STEP 1: Number of Subjects ══ -->
  <div class="card" id="step1">
    <div class="card-title">Step 1 — Setup</div>

    <label for="studentName">Student Name</label>
    <input type="text" id="studentName" placeholder="e.g. Riya Sharma"
           style="margin-bottom:1.2rem;background:var(--surface);border:1px solid var(--border);
                  border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;
                  font-size:1rem;padding:.7rem 1rem;outline:none;width:100%;
                  transition:border-color .2s,box-shadow .2s;"
           onfocus="this.style.borderColor='var(--accent)';this.style.boxShadow='0 0 0 3px rgba(124,58,237,.2)'"
           onblur="this.style.borderColor='var(--border)';this.style.boxShadow='none'"/>

    <label for="numSubjects">Number of Subjects (1 – 10)</label>
    <input type="number" id="numSubjects" min="1" max="10" placeholder="e.g. 5"/>

    <button class="btn btn-primary" onclick="generateMarksForm()">Next → Enter Marks</button>
  </div>

  <!-- ══ STEP 2: Enter Marks (generated by JS loop) ══ -->
  <div class="card hidden" id="step2">
    <div class="card-title">Step 2 — Enter Marks <span id="marksSubtitle" style="color:var(--muted);font-size:.8rem;margin-left:.5rem;"></span></div>
    <div id="marksGrid"></div>
    <button class="btn btn-primary" onclick="calculateResult()">Calculate Result</button>
    <button class="btn btn-secondary" onclick="goBack()">← Back</button>
  </div>

  <!-- ══ RESULT CARD ══ -->
  <div id="resultCard">
    <div class="card">
      <div class="card-title">Result — <span id="resultName" style="color:#fff;font-family:'Inter';text-transform:none;letter-spacing:0;"></span></div>

      <!-- Stats -->
      <div class="result-grid">
        <div class="stat-box">
          <div class="val" id="totalMarks">—</div>
          <div class="lbl">Total Marks</div>
        </div>
        <div class="stat-box">
          <div class="val" id="avgMarks">—</div>
          <div class="lbl">Average</div>
        </div>
        <div class="stat-box">
          <div class="val" id="maxMarks">—</div>
          <div class="lbl">Maximum</div>
        </div>
        <div class="stat-box">
          <div class="val" id="minMarks">—</div>
          <div class="lbl">Minimum</div>
        </div>
      </div>

      <!-- Grade badge -->
      <div class="grade-badge" id="gradeBadge">
        <div class="grade-letter" id="gradeLetter">—</div>
        <div class="grade-label"  id="gradeLabel">—</div>
      </div>

      <!-- Pass/Fail -->
      <div style="text-align:center;margin-bottom:1.2rem;">
        <span class="pf-badge" id="pfBadge">—</span>
      </div>

      <!-- Marks Breakdown -->
      <div class="card-title" style="margin-bottom:.6rem;">Subject Breakdown</div>
      <table class="marks-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Subject</th>
            <th>Marks</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="marksBreakdown"></tbody>
      </table>
    </div>

    <div class="card" style="padding:1.2rem;">
      <button class="btn btn-primary" onclick="resetAll()">🔄 Calculate Again</button>
    </div>
  </div>

  <!-- ══ JAVASCRIPT ══ -->
  <script>
    // ─── State ───
    let numSubjects = 0;

    // ─── STEP 1: Generate marks input fields using a FOR LOOP ───
    function generateMarksForm() {
      const nameVal = document.getElementById('studentName').value.trim();
      const n = parseInt(document.getElementById('numSubjects').value);

      // Validation
      if (!nameVal) { alert('Please enter the student name.'); return; }
      if (isNaN(n) || n < 1 || n > 10) { alert('Please enter a valid number of subjects (1–10).'); return; }

      numSubjects = n;

      // Build marks grid using a FOR LOOP
      let html = '';
      for (let i = 1; i <= n; i++) {           // ← FOR LOOP (Experiment requirement)
        html += `
          <div class="mark-group">
            <label>Subject ${i} Marks (0–100)</label>
            <input type="number" id="mark_${i}" min="0" max="100" placeholder="0–100" />
          </div>`;
      }

      document.getElementById('marksGrid').innerHTML = html;
      document.getElementById('marksSubtitle').textContent = `(${n} subjects)`;

      // Step transition
      document.getElementById('step1').classList.add('hidden');
      document.getElementById('step2').classList.remove('hidden');

      // Update dots
      document.getElementById('dot1').classList.remove('active');
      document.getElementById('dot1').classList.add('done');
      document.getElementById('dot2').classList.add('active');
    }

    // ─── STEP 2: Calculate using loop + if-else conditions ───
    function calculateResult() {
      const name = document.getElementById('studentName').value.trim();
      let marks = [];
      let total = 0;

      // Collect marks using a FOR LOOP
      for (let i = 1; i <= numSubjects; i++) {       // ← FOR LOOP
        const val = parseInt(document.getElementById(`mark_${i}`).value);
        if (isNaN(val) || val < 0 || val > 100) {
          alert(`Please enter valid marks (0–100) for Subject ${i}.`);
          return;
        }
        marks.push(val);
        total += val;                                  // ← accumulating total (variable + operator)
      }

      // ─── Calculations (Variables & Operators) ───
      const average   = total / numSubjects;           // ← variable, arithmetic operator
      const maxMark   = Math.max(...marks);
      const minMark   = Math.min(...marks);

      // ─── Grade using IF-ELSE conditions ───
      let grade, gradeLabel, gradeClass;

      if (average >= 90) {                             // ← IF-ELSE CHAIN
        grade = 'O'; gradeLabel = 'Outstanding'; gradeClass = 'grade-O';
      } else if (average >= 80) {
        grade = 'A'; gradeLabel = 'Excellent';   gradeClass = 'grade-A';
      } else if (average >= 70) {
        grade = 'B'; gradeLabel = 'Very Good';   gradeClass = 'grade-B';
      } else if (average >= 60) {
        grade = 'C'; gradeLabel = 'Good';        gradeClass = 'grade-C';
      } else if (average >= 50) {
        grade = 'D'; gradeLabel = 'Average';     gradeClass = 'grade-D';
      } else {
        grade = 'F'; gradeLabel = 'Fail';        gradeClass = 'grade-F';
      }

      // ─── Pass/Fail condition ───
      // Student passes only if every subject >= 35
      let passed = true;
      for (let i = 0; i < marks.length; i++) {        // ← FOR LOOP
        if (marks[i] < 35) { passed = false; break; } // ← IF condition
      }

      // ─── Display results ───
      document.getElementById('resultName').textContent = name;
      document.getElementById('totalMarks').textContent = total;
      document.getElementById('avgMarks').textContent   = average.toFixed(2);
      document.getElementById('maxMarks').textContent   = maxMark;
      document.getElementById('minMarks').textContent   = minMark;

      // Grade badge
      const badge = document.getElementById('gradeBadge');
      badge.className = `grade-badge ${gradeClass}`;
      document.getElementById('gradeLetter').textContent = grade;
      document.getElementById('gradeLabel').textContent  = gradeLabel;

      // Pass/Fail badge
      const pfBadge = document.getElementById('pfBadge');
      if (passed) {
        pfBadge.textContent  = '✓  PASS';
        pfBadge.className    = 'pf-badge pf-pass';
      } else {
        pfBadge.textContent  = '✗  FAIL';
        pfBadge.className    = 'pf-badge pf-fail';
      }

      // Marks breakdown table using FOR LOOP
      let tableHTML = '';
      for (let i = 0; i < marks.length; i++) {         // ← FOR LOOP
        const status = marks[i] >= 35 ? 'pass' : 'fail';
        const statusText = marks[i] >= 35 ? 'Pass' : 'Fail';
        tableHTML += `
          <tr>
            <td>${i + 1}</td>
            <td>Subject ${i + 1}</td>
            <td>${marks[i]} / 100</td>
            <td class="${status}">${statusText}</td>
          </tr>`;
      }
      document.getElementById('marksBreakdown').innerHTML = tableHTML;

      // Show result, hide form
      document.getElementById('step2').classList.add('hidden');
      document.getElementById('resultCard').style.display = 'block';

      // Dots
      document.getElementById('dot2').classList.remove('active');
      document.getElementById('dot2').classList.add('done');
      document.getElementById('dot3').classList.add('active');
    }

    // ─── Go back to step 1 from step 2 ───
    function goBack() {
      document.getElementById('step2').classList.add('hidden');
      document.getElementById('step1').classList.remove('hidden');
      document.getElementById('dot2').classList.remove('active');
      document.getElementById('dot1').classList.remove('done');
      document.getElementById('dot1').classList.add('active');
    }

    // ─── Reset everything ───
    function resetAll() {
      document.getElementById('studentName').value  = '';
      document.getElementById('numSubjects').value  = '';
      document.getElementById('marksGrid').innerHTML = '';
      document.getElementById('resultCard').style.display = 'none';
      document.getElementById('step1').classList.remove('hidden');

      // Reset dots
      document.getElementById('dot1').className = 'step-dot active';
      document.getElementById('dot2').className = 'step-dot';
      document.getElementById('dot3').className = 'step-dot';
    }

    // Allow text input focus style via JS
    const nameInput = document.getElementById('studentName');
  </script>

</body>
</html>
