<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 6 - DOM Manipulation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1 id="heading">DOM Manipulation and Event Handling</h1>

        <input type="text" id="messageInput"
            placeholder="Enter your message here">

        <p id="paragraph">
            This paragraph can be changed, hidden, or shown using JavaScript.
        </p>

        <div class="buttons">
            <button id="changeTextBtn">Change Heading Text</button>

            <button id="bgColorBtn">
                Change Background Color
            </button>

            <button id="fontSizeBtn">
                Increase Font Size
            </button>

            <button id="toggleBtn">
                Show/Hide Paragraph
            </button>

            <button id="resetBtn">
                Reset Page
            </button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
