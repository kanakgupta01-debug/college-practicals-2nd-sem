<!DOCTYPE html>
<html>
<head>
    <title>Temperature Converter</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 320px;
            text-align: center;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
        }

        label {
            display: block;
            text-align: left;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #007bff;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>🌡️ Temperature Converter</h2>

        <label>Celsius (°C)</label>
        <input type="number" id="celsius" oninput="convertToFahrenheit()">

        <label>Fahrenheit (°F)</label>
        <input type="number" id="fahrenheit" oninput="convertToCelsius()">
    </div>

    <script>
        function convertToFahrenheit() {
            let c = document.getElementById("celsius").value;
            let f = (c * 9 / 5) + 32;
            document.getElementById("fahrenheit").value = c === "" ? "" : f.toFixed(2);
        }

        function convertToCelsius() {
            let f = document.getElementById("fahrenheit").value;
            let c = (f - 32) * 5 / 9;
            document.getElementById("celsius").value = f === "" ? "" : c.toFixed(2);
        }
    </script>

</body>
</html>
